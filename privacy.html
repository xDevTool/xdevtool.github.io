<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy - DevKit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="language-switcher">
        <select id="languageSelect" onchange="switchLanguage()">
            <option value="en">🇺🇸 English</option>
            <option value="zh-cn">🇨🇳 简体中文</option>
        </select>
    </div>

    <div class="container">
        <div id="content-container"></div>
    </div>

    <script src="privacy-content.js"></script>
    <script>
        function switchLanguage() {
            const selectedLang = document.getElementById('languageSelect').value;
            const content = privacyContent[selectedLang] || privacyContent['en'];
            
            document.getElementById('content-container').innerHTML = content;
            localStorage.setItem('preferredLanguage', selectedLang);
            
            const titles = {
                'en': 'Privacy Policy - DevKit',
                'zh-cn': '隐私政策 - DevKit'
            };
            document.title = titles[selectedLang] || titles['en'];
        }
        
        window.addEventListener('DOMContentLoaded', function() {
            const savedLang = localStorage.getItem('preferredLanguage') || 'en';
            document.getElementById('languageSelect').value = savedLang;
            switchLanguage();
        });
    </script>
</body>
</html>
