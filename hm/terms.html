<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Agreement - DevTool-HM</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="language-switcher">
        <select id="languageSelect" onchange="switchLanguage()">
            <option value="en">🇺🇸 English</option>
            <option value="zh-cn">🇨🇳 简体中文</option>
        </select>
    </div>

    <div class="container">
        <div id="content-container"></div>
    </div>

    <script src="terms-content.js"></script>
    <script>
        function normalizeLanguage(value) {
            if (value === 'zh' || value === 'zh-cn') {
                return 'zh-cn';
            }
            return 'en';
        }

        function switchLanguage() {
            const selectedLang = normalizeLanguage(document.getElementById('languageSelect').value);
            const content = termsContent[selectedLang] || termsContent['en'];

            document.getElementById('languageSelect').value = selectedLang;
            document.getElementById('content-container').innerHTML = content;
            localStorage.setItem('hmPreferredLanguage', selectedLang);
            history.replaceState(null, '', `${location.pathname}?lang=${selectedLang}`);

            const titles = {
                'en': 'User Agreement - DevTool-HM',
                'zh-cn': '用户协议 - DevTool-HM'
            };
            document.title = titles[selectedLang] || titles['en'];
        }

        window.addEventListener('DOMContentLoaded', function() {
            const queryLang = new URLSearchParams(window.location.search).get('lang');
            const savedLang = normalizeLanguage(queryLang || localStorage.getItem('hmPreferredLanguage') || 'zh-cn');
            document.getElementById('languageSelect').value = savedLang;
            switchLanguage();
        });
    </script>
</body>
</html>
